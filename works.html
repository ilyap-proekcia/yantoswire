<script>
  /* ── Авто-рік ───────────────────────────────────────────────── */
  document.querySelectorAll('.ftr-year').forEach(el => el.textContent = new Date().getFullYear());

  /* ── Infinite velocity carousel ────────────────────────────── */
  const trackWrap = document.getElementById('pf-track-wrap');
  const track     = document.getElementById('pf-track');
  const origCards = Array.from(track.querySelectorAll('.pf-card'));

  /* Клонуємо картки для безкінечного лупу */
  origCards.forEach(c => track.appendChild(c.cloneNode(true)));
  const allCards = Array.from(track.querySelectorAll('.pf-card'));

  /* Ширина одного сету (відстань між card[0] і першим клоном) */
  let setW = 0;
  function measureSet() {
    setW = allCards[origCards.length].offsetLeft - allCards[0].offsetLeft;
  }
  requestAnimationFrame(measureSet);
  window.addEventListener('resize', measureSet, { passive: true });

  let posX     = 0;
  let velX     = 0;
  let rotNow   = 0;
  let rotTarget = 0;

  let FRICTION    = 0.86;
  let ROT_FACTOR  = 0.5;
  let MAX_ROT     = 45;
  let ROT_LERP    = 0.3;
  let WHEEL_MULT  = 0.25;
  let WHEEL_CAP   = 145;
  let VEL_CAP     = 45;
  const IS_MOBILE = window.matchMedia('(max-width: 600px)').matches;
  const TOUCH_MULT = IS_MOBILE ? 0.63 : 0.7; /* моб: 0.7 × 0.9 = 0.63 */

  /* Скидаємо hover-стан при скролі */
  function clearHover() {
    track.classList.remove('has-hover');
    allCards.forEach(c => c.classList.remove('is-hovered'));
  }

  /* Wheel */
  window.addEventListener('wheel', e => {
    e.preventDefault();
    clearHover();
    const raw = e.deltaY !== 0 ? e.deltaY : e.deltaX;
    const d   = Math.sign(raw) * Math.min(Math.abs(raw), WHEEL_CAP);
    velX -= d * WHEEL_MULT;
    velX  = Math.max(-VEL_CAP, Math.min(VEL_CAP, velX));
  }, { passive: false });

  /* Drag */
  let dragOn = false, dragPrev = 0;
  document.getElementById('pf-main').addEventListener('mousedown', e => {
    dragOn = true; dragPrev = e.clientX;
    clearHover();
  });
  window.addEventListener('mousemove', e => {
    if (!dragOn) return;
    velX += (e.clientX - dragPrev) * 0.45;
    dragPrev = e.clientX;
  });
  window.addEventListener('mouseup', () => { dragOn = false; });

  /* Touch */
  let tPrev = 0;
  window.addEventListener('touchstart', e => { tPrev = e.touches[0].clientX; }, { passive: true });
  window.addEventListener('touchmove',  e => {
    velX += (e.touches[0].clientX - tPrev) * TOUCH_MULT;
    tPrev = e.touches[0].clientX;
  }, { passive: true });

  function tick() {
    posX += velX;
    velX *= FRICTION;
    if (Math.abs(velX) < 0.04) velX = 0;

    /* Безкінечний луп */
    if (setW > 0) {
      if (posX <= -setW) posX += setW;
      if (posX >  0)     posX -= setW;
    }

    rotTarget = Math.max(-MAX_ROT, Math.min(MAX_ROT, velX * ROT_FACTOR));
    rotNow   += (rotTarget - rotNow) * ROT_LERP;

    trackWrap.style.transform = `translateX(${posX}px)`;
    allCards.forEach(c => {
      c.style.transform = `perspective(1400px) rotateY(${rotNow}deg)`;
    });

    requestAnimationFrame(tick);
  }

  tick();

  /* ── Hover dim effect ────────────────────────────────────────── */
  allCards.forEach(card => {
    card.addEventListener('mouseenter', () => {
      track.classList.add('has-hover');
      card.classList.add('is-hovered');
    });
    card.addEventListener('mouseleave', () => {
      track.classList.remove('has-hover');
      card.classList.remove('is-hovered');
    });
  });

  /* ── Lightbox ───────────────────────────────────────────────── */
  const lightbox  = document.getElementById('pf-lightbox');
  const lbImg     = document.getElementById('pf-lb-img');
  const lbClose   = document.getElementById('pf-lb-close');

  function openLightbox(src, alt) {
    lbImg.src = src;
    lbImg.alt = alt || '';
    lightbox.classList.add('active');
  }
  function closeLightbox() {
    lightbox.classList.remove('active');
    lbImg.src = '';
  }

  /* Делегуємо кліки на track (покриває оригінали + клони) */
  track.addEventListener('click', e => {
    const img = e.target.closest('.pf-card__img')?.querySelector('img');
    if (!img) return;
    openLightbox(img.src, img.alt);
  });

  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) closeLightbox();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>

</body>
</html>
